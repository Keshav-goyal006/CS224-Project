<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1020" viewBox="0 0 1800 1020" role="img" aria-labelledby="title desc">
  <title id="title">top_fpga timing diagram</title>
  <desc id="desc">Representative top_fpga timing diagram with major internal signals and explicit dmem read/write address buses.</desc>

  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f3d5e"/>
      <stop offset="100%" stop-color="#145b7d"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef5fb"/>
    </linearGradient>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #d8ecff; }
      .axis { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #34526b; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #1d3447; }
      .note { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #2f4f66; }
      .tiny { font: 500 12px 'Consolas', 'Courier New', monospace; fill: #103247; }
      .busText { font: 600 13px 'Consolas', 'Courier New', monospace; fill: #0e2f45; }
      .gridMajor { stroke: #c3d6e5; stroke-width: 1.2; }
      .gridMinor { stroke: #dfebf4; stroke-width: 1; }
      .clk { stroke: #2d5f8f; stroke-width: 3; fill: none; }
      .sig { stroke: #1e8f6a; stroke-width: 3; fill: none; }
      .sigWarn { stroke: #a65c00; stroke-width: 3; fill: none; }
      .sigMMIO { stroke: #8a3fb0; stroke-width: 3; fill: none; }
      .busLine { stroke: #205b84; stroke-width: 3; fill: none; }
      .busBoxRead { fill: #d8ecfa; stroke: #3f82b3; stroke-width: 1.5; rx: 6; }
      .busBoxWrite { fill: #ffe6cc; stroke: #d0842a; stroke-width: 1.5; rx: 6; }
      .busBoxData { fill: #e6f6e8; stroke: #4f9c63; stroke-width: 1.5; rx: 6; }
      .callout { fill: #ffffff; stroke: #6e90aa; stroke-width: 1.2; rx: 8; }
      .laneBox { fill: #ffffff; stroke: #d7e4ef; stroke-width: 1; rx: 10; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1020" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1800" height="96" fill="url(#headerGrad)"/>

  <text x="28" y="42" class="title">top_fpga Representative Timing Diagram</text>
  <text x="28" y="69" class="subtitle">Major internal/control signals with explicit DMEM read and write address buses</text>

  <!-- Layout anchors -->
  <rect x="26" y="118" width="1748" height="830" class="laneBox"/>

  <!-- Time axis -->
  <line x1="320" y1="128" x2="1640" y2="128" stroke="#6f8aa0" stroke-width="1.6"/>
  <text x="260" y="132" class="axis">Time</text>

  <!-- Vertical cycle grid -->
  <line x1="320" y1="130" x2="320" y2="820" class="gridMajor"/>
  <line x1="430" y1="130" x2="430" y2="820" class="gridMajor"/>
  <line x1="540" y1="130" x2="540" y2="820" class="gridMajor"/>
  <line x1="650" y1="130" x2="650" y2="820" class="gridMajor"/>
  <line x1="760" y1="130" x2="760" y2="820" class="gridMajor"/>
  <line x1="870" y1="130" x2="870" y2="820" class="gridMajor"/>
  <line x1="980" y1="130" x2="980" y2="820" class="gridMajor"/>
  <line x1="1090" y1="130" x2="1090" y2="820" class="gridMajor"/>
  <line x1="1200" y1="130" x2="1200" y2="820" class="gridMajor"/>
  <line x1="1310" y1="130" x2="1310" y2="820" class="gridMajor"/>
  <line x1="1420" y1="130" x2="1420" y2="820" class="gridMajor"/>
  <line x1="1530" y1="130" x2="1530" y2="820" class="gridMajor"/>
  <line x1="1640" y1="130" x2="1640" y2="820" class="gridMajor"/>

  <!-- Half-cycle guides for clock readability -->
  <line x1="375" y1="130" x2="375" y2="820" class="gridMinor"/>
  <line x1="485" y1="130" x2="485" y2="820" class="gridMinor"/>
  <line x1="595" y1="130" x2="595" y2="820" class="gridMinor"/>
  <line x1="705" y1="130" x2="705" y2="820" class="gridMinor"/>
  <line x1="815" y1="130" x2="815" y2="820" class="gridMinor"/>
  <line x1="925" y1="130" x2="925" y2="820" class="gridMinor"/>
  <line x1="1035" y1="130" x2="1035" y2="820" class="gridMinor"/>
  <line x1="1145" y1="130" x2="1145" y2="820" class="gridMinor"/>
  <line x1="1255" y1="130" x2="1255" y2="820" class="gridMinor"/>
  <line x1="1365" y1="130" x2="1365" y2="820" class="gridMinor"/>
  <line x1="1475" y1="130" x2="1475" y2="820" class="gridMinor"/>
  <line x1="1585" y1="130" x2="1585" y2="820" class="gridMinor"/>

  <!-- Horizontal lane guides -->
  <line x1="320" y1="170" x2="1640" y2="170" class="gridMinor"/>
  <line x1="320" y1="230" x2="1640" y2="230" class="gridMinor"/>
  <line x1="320" y1="290" x2="1640" y2="290" class="gridMinor"/>
  <line x1="320" y1="350" x2="1640" y2="350" class="gridMinor"/>
  <line x1="320" y1="410" x2="1640" y2="410" class="gridMinor"/>
  <line x1="320" y1="470" x2="1640" y2="470" class="gridMinor"/>
  <line x1="320" y1="530" x2="1640" y2="530" class="gridMinor"/>
  <line x1="320" y1="590" x2="1640" y2="590" class="gridMinor"/>
  <line x1="320" y1="650" x2="1640" y2="650" class="gridMinor"/>
  <line x1="320" y1="710" x2="1640" y2="710" class="gridMinor"/>
  <line x1="320" y1="770" x2="1640" y2="770" class="gridMinor"/>

  <!-- Cycle labels -->
  <text x="350" y="117" class="axis">C0</text>
  <text x="460" y="117" class="axis">C1</text>
  <text x="570" y="117" class="axis">C2</text>
  <text x="680" y="117" class="axis">C3</text>
  <text x="790" y="117" class="axis">C4</text>
  <text x="900" y="117" class="axis">C5</text>
  <text x="1010" y="117" class="axis">C6</text>
  <text x="1120" y="117" class="axis">C7</text>
  <text x="1230" y="117" class="axis">C8</text>
  <text x="1340" y="117" class="axis">C9</text>
  <text x="1450" y="117" class="axis">C10</text>
  <text x="1560" y="117" class="axis">C11</text>

  <!-- Left labels -->
  <text x="44" y="176" class="label">clk_25MHz</text>
  <text x="44" y="236" class="label">core_reset</text>
  <text x="44" y="296" class="label">inst_mem_address</text>
  <text x="44" y="356" class="label">dmem_read_ready</text>
  <text x="44" y="416" class="label">dmem_read_address</text>
  <text x="44" y="476" class="label">cpu_rdata_mux</text>
  <text x="44" y="536" class="label">dmem_write_ready</text>
  <text x="44" y="596" class="label">dmem_write_address</text>
  <text x="44" y="656" class="label">dmem_we_actual</text>
  <text x="44" y="716" class="label">led_we</text>
  <text x="44" y="776" class="label">uart_we</text>

  <!-- Clock waveform -->
  <path class="clk" d="M320 184 V156 H375 V184 H430 V156 H485 V184 H540 V156 H595 V184 H650 V156 H705 V184 H760 V156 H815 V184 H870 V156 H925 V184 H980 V156 H1035 V184 H1090 V156 H1145 V184 H1200 V156 H1255 V184 H1310 V156 H1365 V184 H1420 V156 H1475 V184 H1530 V156 H1585 V184 H1640"/>

  <!-- core_reset: deassert after startup -->
  <path class="sig" d="M320 244 H540 V216 H1640"/>
  <text x="548" y="206" class="tiny">deasserted (active-high internal reset)</text>

  <!-- inst_mem_address bus -->
  <line x1="320" y1="290" x2="1640" y2="290" class="busLine"/>
  <rect x="548" y="275" width="138" height="30" class="busBoxRead"/>
  <text x="556" y="294" class="busText">0x00000008</text>
  <rect x="768" y="275" width="138" height="30" class="busBoxRead"/>
  <text x="776" y="294" class="busText">0x00000010</text>
  <rect x="988" y="275" width="138" height="30" class="busBoxRead"/>
  <text x="996" y="294" class="busText">0x00000018</text>
  <rect x="1208" y="275" width="138" height="30" class="busBoxRead"/>
  <text x="1216" y="294" class="busText">0x00000020</text>
  <rect x="1428" y="275" width="138" height="30" class="busBoxRead"/>
  <text x="1436" y="294" class="busText">0x00000028</text>
  <text x="1228" y="315" class="tiny">PC increments by 4 each instruction fetch</text>

  <!-- dmem_read_ready pulses -->
  <path class="sig" d="M320 364 H760 V336 H870 V364 H1090 V336 H1200 V364 H1640"/>

  <!-- dmem_read_address bus (explicit) -->
  <line x1="320" y1="410" x2="1640" y2="410" class="busLine"/>
  <rect x="764" y="395" width="102" height="30" class="busBoxRead"/>
  <text x="771" y="414" class="busText">0x00000020</text>
  <rect x="1094" y="395" width="118" height="30" class="busBoxRead"/>
  <text x="1101" y="414" class="busText">0x0001500C</text>
  <line x1="815" y1="336" x2="815" y2="394" stroke="#3f82b3" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="1145" y1="336" x2="1145" y2="394" stroke="#3f82b3" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- cpu_rdata_mux returns one cycle later -->
  <line x1="320" y1="470" x2="1640" y2="470" class="busLine"/>
  <rect x="874" y="455" width="102" height="30" class="busBoxData"/>
  <text x="882" y="474" class="busText">0x0000007F</text>
  <rect x="1204" y="455" width="102" height="30" class="busBoxData"/>
  <text x="1212" y="474" class="busText">0x00000001</text>
  <line x1="815" y1="425" x2="925" y2="454" stroke="#4f9c63" stroke-width="1.3" marker-end="url(#arrowHead)"/>
  <line x1="1145" y1="425" x2="1255" y2="454" stroke="#4f9c63" stroke-width="1.3" marker-end="url(#arrowHead)"/>

  <!-- dmem_write_ready pulses -->
  <path class="sigWarn" d="M320 544 H980 V516 H1090 V544 H1310 V516 H1530 V544 H1640"/>

  <!-- dmem_write_address bus (explicit) -->
  <line x1="320" y1="590" x2="1640" y2="590" class="busLine"/>
  <rect x="984" y="575" width="102" height="30" class="busBoxWrite"/>
  <text x="992" y="594" class="busText">0x00000024</text>
  <rect x="1314" y="575" width="118" height="30" class="busBoxWrite"/>
  <text x="1322" y="594" class="busText">0x00013000</text>
  <rect x="1424" y="575" width="118" height="30" class="busBoxWrite"/>
  <text x="1432" y="594" class="busText">0x00015000</text>
  <line x1="1035" y1="516" x2="1035" y2="574" stroke="#d0842a" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="1365" y1="516" x2="1365" y2="574" stroke="#d0842a" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="1475" y1="516" x2="1475" y2="574" stroke="#d0842a" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- dmem_we_actual: true only for local DMEM write range -->
  <path class="sigWarn" d="M320 664 H980 V636 H1090 V664 H1640"/>
  <text x="1110" y="640" class="tiny">high only when cpu_waddr &lt; 0x00010000</text>

  <!-- led_we and uart_we decode pulses -->
  <path class="sigMMIO" d="M320 724 H1310 V696 H1420 V724 H1640"/>
  <text x="1430" y="702" class="tiny">0x00013000 page decode</text>

  <path class="sigMMIO" d="M320 784 H1420 V756 H1530 V784 H1640"/>
  <text x="1540" y="762" class="tiny">0x00015000 page decode</text>

  <!-- Callouts -->
  <rect x="1210" y="336" width="510" height="86" class="callout"/>
  <text x="1224" y="362" class="note">Read path:</text>
  <text x="1224" y="383" class="note">1) dmem_read_ready pulses with dmem_read_address.</text>
  <text x="1224" y="404" class="note">2) cpu_rdata_mux returns aligned data one cycle later.</text>

  <rect x="1210" y="512" width="510" height="116" class="callout"/>
  <text x="1224" y="538" class="note">Write path:</text>
  <text x="1224" y="559" class="note">1) dmem_write_ready pulses with dmem_write_address.</text>
  <text x="1224" y="580" class="note">2) dmem_we_actual asserted only for local DMEM range.</text>
  <text x="1224" y="601" class="note">3) MMIO pages assert led_we or uart_we instead.</text>

  <!-- Legend -->
  <rect x="42" y="848" width="1720" height="126" class="callout"/>
  <text x="58" y="876" class="label">Legend and assumptions</text>

  <line x1="62" y1="900" x2="102" y2="900" class="clk"/>
  <text x="112" y="905" class="note">Clock waveform</text>

  <line x1="300" y1="900" x2="340" y2="900" class="sig"/>
  <text x="350" y="905" class="note">Control/valid pulses</text>

  <line x1="550" y1="900" x2="590" y2="900" class="sigWarn"/>
  <text x="600" y="905" class="note">DMEM write-domain control</text>

  <line x1="900" y1="900" x2="940" y2="900" class="sigMMIO"/>
  <text x="950" y="905" class="note">MMIO decode pulses</text>

  <rect x="1240" y="886" width="110" height="28" class="busBoxRead"/>
  <text x="1360" y="905" class="note">Read-address bus value</text>

  <rect x="1240" y="922" width="110" height="28" class="busBoxWrite"/>
  <text x="1360" y="941" class="note">Write-address bus value</text>

  <defs>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f9c63"/>
    </marker>
  </defs>
</svg>
